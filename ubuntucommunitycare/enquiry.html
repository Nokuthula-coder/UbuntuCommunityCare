   <header>

    <!-- About Section -->
    <main>

        <section>

            <h2> Make an Enquiry </h2>

            <form id="enquiryForm">

                <label for="name">Full Name:</label>
                <input type="text" id="name" name="Full Name" required />

                <label for="email">Email:</label>
                <input type="email" id="email" name="Email Address" required />

                <label for="enquiry type">Enquiry Type:</label>
                <select id="enquiry type" name="enquiry type" required>
                    <option value="">Select an option</option>
                    <option value="general">Food Support</option>
                    <option value="volunteer">Volunteer Opportunity</option>
                    <option value="donation">Donation </option>
                    <option value="donation">General Information</option>
                </select>

                <button type="submit">Submit Enquiry</button>

            </form>

            <p id="response"></p>

            </section>

            <script src="js/script.js"></script>
